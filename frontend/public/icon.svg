<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- FC Advocacia — emblema: escudo + balança -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A3A6B"/>
      <stop offset="1" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#bg)"/>
  <rect x="3" y="3" width="90" height="90" rx="17" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.55"/>
  <!-- balança -->
  <g stroke="#C9A84C" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="48" y1="22" x2="48" y2="64"/>
    <line x1="26" y1="32" x2="70" y2="32"/>
    <circle cx="48" cy="20" r="3.4" fill="#C9A84C" stroke="none"/>
    <!-- prato esquerdo -->
    <line x1="26" y1="32" x2="19" y2="47"/>
    <line x1="26" y1="32" x2="33" y2="47"/>
    <path d="M16 47 a10 10 0 0 0 20 0 z" fill="#C9A84C" stroke="none" opacity="0.9"/>
    <!-- prato direito -->
    <line x1="70" y1="32" x2="63" y2="47"/>
    <line x1="70" y1="32" x2="77" y2="47"/>
    <path d="M60 47 a10 10 0 0 0 20 0 z" fill="#C9A84C" stroke="none" opacity="0.9"/>
    <!-- base -->
    <line x1="38" y1="64" x2="58" y2="64"/>
    <line x1="34" y1="69" x2="62" y2="69"/>
  </g>
  <text x="48" y="86" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="3">FSC</text>
</svg>
