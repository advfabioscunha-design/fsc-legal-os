services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    restart: unless-stopped
    depends_on: [redis]

  worker:
    build: .
    env_file: .env
    command: rq worker protocolos --url redis://redis:6379/0
    restart: unless-stopped
    depends_on: [redis]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: ["redis_data:/data"]

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.fscadvocaciadigital.com.br}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://midywtybplbdqmkxfoyj.supabase.co}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-}
        NEXT_PUBLIC_AGENDA_URL: ${NEXT_PUBLIC_AGENDA_URL:-}
    ports: ["3000:3000"]
    restart: unless-stopped

volumes:
  redis_data:
